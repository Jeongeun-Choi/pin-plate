name: Auto Pull Request

on:
  push:
    branches:
      - "feature/pin-plate/**"
      - "feature/*"
      - "bugfix/*"
      - "refactor/*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Determine target branch and app
        id: config
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == feature/pin-plate/* ]]; then
            echo "base_branch=pin-plate" >> $GITHUB_OUTPUT
          else
            echo "base_branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test --run

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E Test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_API_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_API_KEY || 'e2e-dummy-anon-key' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY || secrets.NEXT_PUBLIC_SUPABASE_API_KEY || 'e2e-dummy-anon-key' }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || 'e2e-dummy-service-key' }}
        run: pnpm --filter web e2e

      - name: Type Check (Mobile)
        run: cd apps/pin-plate/mobile && npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_API_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_API_KEY }}
        run: pnpm --filter web build

      - name: Create Pull Request (Auto)
        if: success()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ steps.config.outputs.base_branch }}
        run: |

          git fetch origin $BASE_BRANCH

          # 1. Commits & Internal Stats (Fallback/Base)
          printf "## 📝 Commits\n" > pr_body.txt
          git log origin/$BASE_BRANCH..HEAD --pretty=format:"- %s (%h)" >> pr_body.txt
          printf "\n\n## 📊 File Changes\n\`\`\`\n" >> pr_body.txt
          git diff origin/$BASE_BRANCH..HEAD --stat >> pr_body.txt
          printf "\`\`\`\n" >> pr_body.txt

          FALLBACK_BODY=$(cat pr_body.txt)

          # 2. Try AI Summary
          FINAL_BODY="$FALLBACK_BODY"

          if [[ -n "$GEMINI_API_KEY" ]]; then
            echo "GEMINI_API_KEY is present, attempting AI summary... "
            AI_SUMMARY=$(node scripts/generate-pr-summary.mjs || echo "")

            if [[ -n "$AI_SUMMARY" ]]; then
              FINAL_BODY="$AI_SUMMARY

              ---
              $FALLBACK_BODY"
            else
              echo "AI Summary failed. Using fallback."
            fi
          else
            echo "GEMINI_API_KEY not found. Using fallback."
          fi

          # Save to file to avoid shell argument limits/issues
          printf "%s\n" "$FINAL_BODY" > pr_description.md

          gh pr create \
            --base $BASE_BRANCH \
            --head ${{ github.ref_name }} \
            --title "PR: ${{ github.ref_name }}" \
            --body-file pr_description.md \
            || echo "PR already exists or encountered an error"
