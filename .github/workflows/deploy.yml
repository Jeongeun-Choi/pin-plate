name: Deploy to Production

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Clear stale build artifacts
        run: rm -rf node_modules .next .sst apps/pin-plate/web/.next apps/pin-plate/web/.open-next apps/pin-plate/web/node_modules pnpm-lock.yaml

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-v2-

      - name: Cache SST platform (Pulumi binaries)
        uses: actions/cache@v3
        with:
          path: .sst/platform
          key: ${{ runner.os }}-sst-platform-v2-${{ hashFiles('sst.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-sst-platform-v2-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter web lint

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - name: Test
        run: pnpm --filter web test --run

      - name: Set SST secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_API_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_MAPS_BROWSER_API_KEY: ${{ secrets.GOOGLE_MAPS_BROWSER_API_KEY }}
          GOOGLE_MAPS_MAP_ID: ${{ secrets.GOOGLE_MAPS_MAP_ID }}
        run: |
          : "${CLOUDFLARE_ZONE_ID:?Missing CLOUDFLARE_ZONE_ID GitHub secret}"
          if [ -z "${SUPABASE_URL:-}" ]; then
            SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-}"
          fi
          if [ -z "${SUPABASE_API_KEY:-}" ]; then
            SUPABASE_API_KEY="${NEXT_PUBLIC_SUPABASE_API_KEY:-}"
          fi
          : "${SUPABASE_URL:?Missing SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL GitHub secret}"
          : "${SUPABASE_API_KEY:?Missing SUPABASE_API_KEY or NEXT_PUBLIC_SUPABASE_API_KEY GitHub secret}"
          : "${GOOGLE_MAPS_API_KEY:?Missing GOOGLE_MAPS_API_KEY GitHub secret}"
          : "${GOOGLE_MAPS_BROWSER_API_KEY:?Missing GOOGLE_MAPS_BROWSER_API_KEY GitHub secret}"
          : "${GOOGLE_MAPS_MAP_ID:?Missing GOOGLE_MAPS_MAP_ID GitHub secret}"

          pnpm sst secret set CloudflareZoneId "$CLOUDFLARE_ZONE_ID" --stage production
          pnpm sst secret set SupabaseUrl "$SUPABASE_URL" --stage production
          pnpm sst secret set SupabaseApiKey "$SUPABASE_API_KEY" --stage production
          pnpm sst secret set GoogleMapsApiKey "$GOOGLE_MAPS_API_KEY" --stage production
          pnpm sst secret set GoogleMapsBrowserApiKey "$GOOGLE_MAPS_BROWSER_API_KEY" --stage production
          pnpm sst secret set GoogleMapsMapId "$GOOGLE_MAPS_MAP_ID" --stage production

      - name: Unlock SST (clear stale lock)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: pnpm sst unlock --stage production || true

      - name: Deploy via SST
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: |
          for attempt in 1 2 3; do
            pnpm sst deploy --stage production && exit 0
            echo "Attempt $attempt failed. Retrying in 30s..."
            sleep 30
          done
          echo "All deploy attempts failed."
          exit 1
